  <text x="340" y="490" text-anchor="middle" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="480" fill="url(#grad)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, &quot;Arial Black&quot;, sans-serif;font-size:480px;font-weight:800;text-anchor:middle;dominant-baseline:auto">F</text>
